<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@whyyhe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: #0e0e0e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 32px;
            padding: 48px 32px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            border: 1px solid #282828;
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #111;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            border: 1px solid #333;
            color: #aaa;
        }
        h1 {
            font-size: 26px;
            font-weight: 500;
            color: #eee;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .bio {
            font-size: 14px;
            line-height: 1.6;
            margin: 10px 0 32px;
            color: #666;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .links a {
            display: block;
            padding: 15px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 400;
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: 0.25s ease;
            background: #222;
            color: #bbb;
            border: 1px solid #2a2a2a;
        }
        .links a:hover {
            background: #2a2a2a;
            color: #fff;
            border-color: #444;
        }
        .footer {
            margin-top: 32px;
            font-size: 11px;
            color: #2a2a2a;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">💎</div>
        <h1>@whyyhe</h1>
        <div class="bio">one life<br>one shot</div>
        <div class="links">
            <a href="https://t.me/whyyhe" target="_blank">Telegram</a>
            <a href="https://www.instagram.com/oh.whyyhe" target="_blank">Instagram</a>
            <a href="https://guns.lol/whyyhe" target="_blank">Website</a>
        </div>
        <div class="footer">© 2026</div>
    </div>
</body>
</html>
