<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@whyyhe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Стили — те же, что были, только добавил блок для плеера */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0e0e0e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .card {
            position: relative;
            z-index: 1;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 24px 24px 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #555;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .name {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2px 12px;
            font-size: 10px;
            font-weight: 500;
            color: #888;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .badge.admin {
            background: rgba(255, 215, 0, 0.08);
            border-color: rgba(255, 215, 0, 0.15);
            color: #f0c040;
        }
        .content {
            margin: 10px 0 14px;
            padding: 0 2px;
            min-height: 70px;
            text-align: left;
        }
        .content p {
            color: #999;
            font-size: 13px;
            line-height: 1.6;
            font-weight: 300;
        }
        .content a {
            color: #ccc;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }
        .content a:hover {
            color: #fff;
            border-bottom-color: rgba(255,255,255,0.3);
        }
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }
        .social-links a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            font-size: 13px;
            color: #aaa;
            border-bottom: none;
        }
        .social-links a:hover {
            color: #fff;
        }
        .social-links .label {
            opacity: 0.4;
            font-size: 11px;
            margin-left: auto;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: #aaa;
            font-size: 13px;
        }
        .stat-item .stat-label {
            color: #666;
        }
        .stat-item .stat-value {
            color: #ddd;
            font-weight: 500;
        }
        .support-form textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 14px;
            color: #eee;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 60px;
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }
        .support-form textarea:focus {
            border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
        }
        .support-form textarea::placeholder {
            color: #555;
        }
        .support-form .send-btn {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #ccc;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .support-form .send-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .support-status {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        .support-status.success {
            color: #4caf50;
        }
        .support-status.error {
            color: #f44336;
        }
        .tabs {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            gap: 6px;
            margin-top: 4px;
        }
        .tab-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 10px 4px;
            color: #888;
            font-size: 11px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 0;
        }
        .tab-btn .icon {
            font-size: 18px;
            opacity: 0.6;
        }
        .tab-btn .label {
            font-size: 9px;
            opacity: 0.7;
            letter-spacing: 0.3px;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            color: #fff;
        }
        .tab-btn.active {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .footer {
            margin-top: 14px;
            font-size: 9px;
            color: #2a2a2a;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 10px;
        }
        .footer span {
            color: #333;
        }
        .content {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === НОВЫЙ БЛОК — ПЛЕЕР === */
        .player-container {
            margin: 12px 0 10px;
            padding: 12px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 8px;
        }
        .player-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px 8px;
            border-radius: 10px;
        }
        .player-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.05);
        }
        .player-btn.play-btn {
            font-size: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .player-btn.play-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .player-volume {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .player-volume input[type="range"] {
            width: 100%;
            height: 3px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 2px;
            outline: none;
            transition: 0.2s;
        }
        .player-volume input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #888;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .player-volume input[type="range"]::-webkit-slider-thumb:hover {
            background: #ccc;
        }
        .player-volume .vol-icon {
            font-size: 14px;
            color: #666;
            width: 20px;
            text-align: center;
        }
        .player-current-track {
            font-size: 11px;
            color: #555;
            text-align: center;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
        }
        .player-current-track span {
            color: #888;
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="card" id="app">
        <!-- Аватарка и имя (без изменений) -->
        <div class="avatar" id="avatarContainer">
            <span id="avatarPlaceholder">💎</span>
        </div>
        <div class="name" id="userName">@whyyhe</div>
        <div class="badge" id="userBadge">Пользователь</div>

        <!-- Содержимое (вкладки) -->
        <div class="content" id="contentArea">
            <p>Выберите раздел ниже 👇</p>
        </div>

        <!-- ПЛЕЕР (НОВЫЙ БЛОК) -->
        <div class="player-container" id="playerContainer">
            <div class="player-current-track" id="currentTrack">
                <span>🎵</span> EUROVISION · DATA404 · ARLEKIN 40 000
            </div>
            <div class="player-controls">
                <button class="player-btn" id="prevBtn" title="Назад">⏮</button>
                <button class="player-btn play-btn" id="playBtn" title="Пауза/Играть">▶️</button>
                <button class="player-btn" id="nextBtn" title="Вперед">⏭</button>
            </div>
            <div class="player-volume">
                <span class="vol-icon">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>

        <!-- Навигация (кнопки внизу) -->
        <div class="tabs">
            <button class="tab-btn" data-tab="about">
                <span class="icon">ℹ️</span>
                <span class="label">О боте</span>
            </button>
            <button class="tab-btn" data-tab="bio">
                <span class="icon">🔗</span>
                <span class="label">Био</span>
            </button>
            <button class="tab-btn" data-tab="profile">
                <span class="icon">👤</span>
                <span class="label">Профиль</span>
            </button>
            <button class="tab-btn" data-tab="support">
                <span class="icon">🆘</span>
                <span class="label">Поддержка</span>
            </button>
        </div>
        <div class="footer"><span>© 2026</span></div>
    </div>

    <script>
        // ============================================
        // 1. Telegram WebApp
        // ============================================
        const tg = window.Telegram?.WebApp || {
            initDataUnsafe: { user: { id: 0, first_name: 'Гость', username: 'guest' } },
            close: () => {},
            ready: () => {},
            expand: () => {},
            sendData: (data) => console.log('Telegram WebApp sendData:', data),
        };
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user || { id: 0, first_name: 'Гость', username: 'guest' };
        const userId = user.id;
        const userName = user.first_name || 'Гость';
        const userUsername = user.username || 'guest';
        const isAdmin = (userId === 1107351961);

        // ============================================
        // 2. Элементы DOM и аватар
        // ============================================
        const nameEl = document.getElementById('userName');
        const badgeEl = document.getElementById('userBadge');
        const contentEl = document.getElementById('contentArea');
        const avatarContainer = document.getElementById('avatarContainer');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');

        nameEl.textContent = `@${userUsername}`;

        if (isAdmin) {
            badgeEl.textContent = '👑 Администратор';
            badgeEl.classList.add('admin');
        } else {
            badgeEl.textContent = 'Пользователь';
        }

        function loadAvatar() {
            if (user.photo_url) {
                const img = document.createElement('img');
                img.src = user.photo_url;
                img.alt = 'avatar';
                avatarContainer.innerHTML = '';
                avatarContainer.appendChild(img);
                return;
            }
            avatarPlaceholder.textContent = isAdmin ? '👑' : '👤';
            avatarContainer.innerHTML = '';
            avatarContainer.appendChild(avatarPlaceholder);
        }
        loadAvatar();

        // ============================================
        // 3. Частицы (живой фон)
        // ============================================
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        function resizeCanvas() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particles = [];
        const PARTICLE_COUNT = 60;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 2 + 1,
                dx: (Math.random() - 0.5) * 0.4,
                dy: (Math.random() - 0.5) * 0.4,
                a: Math.random() * 0.4 + 0.1,
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => {
                p.x += p.dx;
                p.y += p.dy;
                if (p.x < 0 || p.x > w) p.dx *= -1;
                if (p.y < 0 || p.y > h) p.dy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.a})`;
                ctx.fill();
            });
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(255,255,255,${0.05 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // ============================================
        // 4. ПЛЕЕР (Главное обновление)
        // ============================================
        // --- Плейлист (Ты можешь добавлять сюда новые треки) ---
        const playlist = [
            {
                id: 1,
                title: 'EUROVISION · DATA404 · ARLEKIN 40 000',
                // Используем встраиваемый YouTube-плеер для этого трека
                // Конвертируем ссылку в embed-формат
                url: 'https://www.youtube.com/embed/DHYT53jgPk4?autoplay=0&controls=0&loop=1&playlist=DHYT53jgPk4'
            }
            // 🎵 Добавляй сюда новые треки по такой же схеме:
            // {
            //   id: 2,
            //   title: 'Название трека',
            //   url: 'https://www.youtube.com/embed/ID_ВИДЕО?autoplay=0&controls=0&loop=1&playlist=ID_ВИДЕО'
            // }
        ];

        let currentTrackIndex = 0;
        let isPlaying = false;

        // Создаём скрытый iframe для YouTube
        const iframe = document.createElement('iframe');
        iframe.style.position = 'absolute';
        iframe.style.width = '0';
        iframe.style.height = '0';
        iframe.style.border = 'none';
        iframe.style.opacity = '0';
        iframe.style.pointerEvents = 'none';
        iframe.allow = 'autoplay; encrypted-media';
        document.body.appendChild(iframe);

        const playerContainer = document.getElementById('playerContainer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const currentTrackEl = document.getElementById('currentTrack');

        // Функция загрузки трека в iframe
        function loadTrack(index) {
            const track = playlist[index];
            if (!track) return;
            // Обновляем название трека
            currentTrackEl.innerHTML = `<span>🎵</span> ${track.title}`;
            // Загружаем iframe с треком
            iframe.src = track.url;
            // Если плеер был включён — пробуем запустить
            if (isPlaying) {
                // Для YouTube автозапуск через autoplay=1 (но нужно перезагрузить iframe)
                // Простой способ: перезагружаем с autoplay=1
                const autoplayUrl = track.url.replace('autoplay=0', 'autoplay=1');
                iframe.src = autoplayUrl;
            } else {
                iframe.src = track.url;
            }
        }

        // Функция воспроизведения/паузы
        function togglePlay() {
            if (playlist.length === 0) return;
            if (isPlaying) {
                // Пауза: останавливаем iframe (ставим autoplay=0)
                const track = playlist[currentTrackIndex];
                iframe.src = track.url;
                playBtn.textContent = '▶️';
                isPlaying = false;
            } else {
                // Воспроизведение: автозапуск
                const track = playlist[currentTrackIndex];
                const autoplayUrl = track.url.replace('autoplay=0', 'autoplay=1');
                iframe.src = autoplayUrl;
                playBtn.textContent = '⏸️';
                isPlaying = true;
            }
        }

        // Следующий трек
        function nextTrack() {
            if (playlist.length === 0) return;
            currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            loadTrack(currentTrackIndex);
            if (isPlaying) {
                // Если играло — продолжаем с новым треком
                const track = playlist[currentTrackIndex];
                const autoplayUrl = track.url.replace('autoplay=0', 'autoplay=1');
                iframe.src = autoplayUrl;
                playBtn.textContent = '⏸️';
            } else {
                playBtn.textContent = '▶️';
            }
        }

        // Предыдущий трек
        function prevTrack() {
            if (playlist.length === 0) return;
            currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrackIndex);
            if (isPlaying) {
                const track = playlist[currentTrackIndex];
                const autoplayUrl = track.url.replace('autoplay=0', 'autoplay=1');
                iframe.src = autoplayUrl;
                playBtn.textContent = '⏸️';
            } else {
                playBtn.textContent = '▶️';
            }
        }

        // Громкость
        volumeSlider.addEventListener('input', function() {
            // Для iframe управление громкостью не работает напрямую, но мы сохраняем значение
            // Можно добавить визуальный фидбек
            const vol = this.value;
            // Для YouTube можно передать параметр volume, но это требует API
            // Пока просто сохраняем и показываем иконку
            const icon = document.querySelector('.vol-icon');
            if (vol > 0.5) icon.textContent = '🔊';
            else if (vol > 0.1) icon.textContent = '🔉';
            else icon.textContent = '🔈';
            // Сохраняем в localStorage
            localStorage.setItem('player_volume', vol);
        });

        // Восстанавливаем громкость
        const savedVolume = localStorage.getItem('player_volume');
        if (savedVolume !== null) {
            volumeSlider.value = savedVolume;
        }

        // Обработчики кнопок
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);

        // Автоматически загружаем первый трек
        if (playlist.length > 0) {
            loadTrack(0);
            // Ставим иконку play
            playBtn.textContent = '▶️';
            isPlaying = false;
        }

        // Останавливаем музыку при закрытии приложения
        window.addEventListener('beforeunload', () => {
            iframe.src = '';
            tg.close();
        });

        // ============================================
        // 5. Поддержка (отправка сообщений)
        // ============================================
        function sendSupportMessage(text) {
            const statusEl = document.getElementById('supportStatus');
            if (statusEl) {
                statusEl.textContent = '⏳ Отправка...';
                statusEl.className = 'support-status';
            }

            const data = {
                type: 'support',
                user_id: userId,
                username: userUsername,
                first_name: userName,
                text: text,
                is_admin: isAdmin,
            };

            try {
                tg.sendData(JSON.stringify(data));
                if (statusEl) {
                    statusEl.textContent = '✅ Сообщение отправлено! Администратор ответит в ближайшее время.';
                    statusEl.className = 'support-status success';
                }
            } catch (e) {
                console.error('Ошибка отправки:', e);
                if (statusEl) {
                    statusEl.textContent = '❌ Ошибка отправки. Попробуйте позже.';
                    statusEl.className = 'support-status error';
                }
            }
        }

        // ============================================
        // 6. Контент вкладок
        // ============================================
        const contentMap = {
            about: `
                <p>
                    🤖 Бот создан <strong>@whyyhe</strong>.
                    <br><br>
                    Управление сообществом, статистика, поддержка.
                </p>
            `,
            bio: `
                <div class="social-links">
                    <a href="https://t.me/whyyhe" target="_blank">📩 Telegram <span class="label">личный</span></a>
                    <a href="https://t.me/w3hand" target="_blank">📢 Telegram <span class="label">канал</span></a>
                    <a href="https://www.instagram.com/oh.whyyhe" target="_blank">📸 Instagram</a>
                    <a href="https://www.tiktok.com/@oh.whyyhe" target="_blank">🎵 TikTok</a>
                    <a href="https://evgteem.github.io/my-site/" target="_blank">🌐 Сайт</a>
                </div>
            `,
            profile: `
                <div style="margin-top: 4px;">
                    <div class="stat-item">
                        <span class="stat-label">👤 Имя</span>
                        <span class="stat-value">${userName}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">🆔 ID</span>
                        <span class="stat-value">${userId}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">📛 Юзернейм</span>
                        <span class="stat-value">@${userUsername}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">📅 Дата регистрации</span>
                        <span class="stat-value">${new Date().toLocaleDateString()}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">📊 Статус</span>
                        <span class="stat-value">${isAdmin ? '👑 Администратор' : 'Пользователь'}</span>
                    </div>
                </div>
            `,
            support: `
                <div class="support-form">
                    <textarea id="supportText" placeholder="Напишите ваше сообщение..." rows="3"></textarea>
                    <button class="send-btn" id="supportSendBtn">📩 Отправить</button>
                    <div id="supportStatus" class="support-status"></div>
                </div>
            `
        };

        // ============================================
        // 7. Переключение вкладок
        // ============================================
        function switchTab(tab) {
            const content = contentMap[tab] || '<p>Раздел в разработке</p>';
            contentEl.innerHTML = content;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            if (tab === 'support') {
                const sendBtn = document.getElementById('supportSendBtn');
                const textarea = document.getElementById('supportText');
                if (sendBtn && textarea) {
                    sendBtn.addEventListener('click', function() {
                        const text = textarea.value.trim();
                        if (text.length === 0) {
                            const status = document.getElementById('supportStatus');
                            if (status) {
                                status.textContent = '❌ Напишите сообщение!';
                                status.className = 'support-status error';
                            }
                            return;
                        }
                        sendSupportMessage(text);
                        textarea.value = '';
                    });
                }
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                switchTab(this.dataset.tab);
            });
        });

        // Открываем вкладку "О боте"
        switchTab('about');

        console.log('✅ Мини-приложение с плеером и плейлистом загружено!');
        console.log('👤 Пользователь:', user);
        console.log('👑 Админ:', isAdmin);
        console.log('🎵 Плейлист:', playlist);
    </script>
</body>
</html>
