<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@whyyhe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0e0e0e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        #particles-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .card {
            position: relative;
            z-index: 1;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 24px 24px 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
        }
        .avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #555;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .name {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 2px 12px;
            font-size: 10px;
            font-weight: 500;
            color: #888;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .badge.admin {
            background: rgba(255,215,0,0.08);
            border-color: rgba(255,215,0,0.15);
            color: #f0c040;
        }
        .content {
            margin: 10px 0 14px;
            padding: 0 2px;
            min-height: 70px;
            text-align: left;
        }
        .content p {
            color: #999;
            font-size: 13px;
            line-height: 1.6;
            font-weight: 300;
        }
        .content a {
            color: #ccc;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .content a:hover { color: #fff; }
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }
        .social-links a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            font-size: 13px;
            color: #aaa;
            border-bottom: none;
        }
        .social-links a:hover { color: #fff; }
        .social-links .label {
            opacity: 0.4;
            font-size: 11px;
            margin-left: auto;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: #aaa;
            font-size: 13px;
        }
        .stat-item .stat-label { color: #666; }
        .stat-item .stat-value { color: #ddd; font-weight: 500; }
        .support-form textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 14px;
            color: #eee;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 60px;
            outline: none;
            box-sizing: border-box;
        }
        .support-form textarea:focus {
            border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
        }
        .support-form textarea::placeholder { color: #555; }
        .support-form .send-btn {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #ccc;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .support-form .send-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .support-status {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        .support-status.success { color: #4caf50; }
        .support-status.error { color: #f44336; }
        .tabs {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            gap: 6px;
            margin-top: 4px;
        }
        .tab-btn {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 10px 4px;
            color: #888;
            font-size: 11px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 0;
        }
        .tab-btn .icon {
            font-size: 18px;
            opacity: 0.6;
        }
        .tab-btn .label {
            font-size: 9px;
            opacity: 0.7;
            letter-spacing: 0.3px;
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.12);
            color: #fff;
        }
        .tab-btn.active {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
            color: #fff;
        }
        .footer {
            margin-top: 14px;
            font-size: 9px;
            color: #2a2a2a;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 10px;
        }
        .footer span { color: #333; }
        .content {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .player-container {
            margin: 12px 0 10px;
            padding: 12px 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .player-current-track {
            font-size: 11px;
            color: #555;
            text-align: center;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
        }
        .player-current-track span { color: #888; }
        .player-controls, .player-btn, .play-btn, .player-volume, .player-progress {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="card" id="app">
        <div class="avatar" id="avatarContainer"><span id="avatarPlaceholder">💎</span></div>
        <div class="name" id="userName">@whyyhe</div>
        <div class="badge" id="userBadge">Пользователь</div>

        <div class="content" id="contentArea"><p>Выберите раздел ниже 👇</p></div>

        <!-- ПЛЕЕР -->
        <div class="player-container">
            <div class="player-current-track">
                <span>🎵</span> EUROVISION · DATA404 · ARLEKIN 40 000
            </div>
            <iframe 
                width="100%" 
                height="120" 
                scrolling="no" 
                frameborder="no" 
                allow="autoplay; encrypted-media" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A2038944788&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=true"
                style="border-radius: 16px; background: #1a1a1a; border: 1px solid #2a2a2a;"
            ></iframe>
        </div>

        <!-- 5 ВКЛАДОК -->
        <div class="tabs">
            <button class="tab-btn" data-tab="about"><span class="icon">ℹ️</span><span class="label">О боте</span></button>
            <button class="tab-btn" data-tab="bio"><span class="icon">🔗</span><span class="label">Био</span></button>
            <button class="tab-btn" data-tab="profile"><span class="icon">👤</span><span class="label">Профиль</span></button>
            <button class="tab-btn" data-tab="support"><span class="icon">🆘</span><span class="label">Поддержка</span></button>
            <button class="tab-btn" data-tab="vip"><span class="icon">⭐</span><span class="label">VIP</span></button>
        </div>
        <div class="footer"><span>© 2026</span></div>
    </div>

    <script>
        // ============================================
        // 1. Telegram WebApp — перехватываем данные
        // ============================================
        const tg = window.Telegram?.WebApp || {
            initDataUnsafe: { user: { id: 0, first_name: 'Гость', username: 'guest' } },
            close: () => {},
            ready: () => {},
            expand: () => {},
            sendData: (data) => console.log('Telegram WebApp sendData:', data),
        };
        tg.ready();
        tg.expand();

        // ============================================
        // 2. ПОЛУЧАЕМ ID (ДАЖЕ ЕСЛИ ПРИЛОЖЕНИЕ НЕ ПЕРЕДАЛО)
        // ============================================
        let userId = 0;
        let userName = 'Гость';
        let userUsername = 'guest';
        let isAdmin = false;

        // Пытаемся взять из initDataUnsafe (это стандартный способ)
        try {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const u = tg.initDataUnsafe.user;
                userId = u.id || 0;
                userName = u.first_name || 'Гость';
                userUsername = u.username || 'guest';
            }
        } catch (e) {
            console.warn('Не удалось получить данные из initDataUnsafe:', e);
        }

        // Если ID = 0, значит Telegram не передал данные.
        // Тогда мы их запросим у бота через WebApp.sendData()
        if (userId === 0) {
            console.log('Данные пользователя не получены, запрашиваем у бота...');
            // Отправляем запрос боту на получение ID
            tg.sendData(JSON.stringify({ type: 'get_user_id' }));
            // Бот должен ответить через web_app_data
            // Но чтобы не ждать, показываем заглушку
            document.getElementById('userName').textContent = 'Загрузка...';
        } else {
            // Если данные есть — сразу отображаем
            document.getElementById('userName').textContent = `@${userUsername}`;
            isAdmin = (userId === 1107351961);
            const badgeEl = document.getElementById('userBadge');
            if (isAdmin) {
                badgeEl.textContent = '👑 Администратор';
                badgeEl.classList.add('admin');
            } else {
                badgeEl.textContent = 'Пользователь';
            }
        }

        // ============================================
        // 3. Обработка ответа от бота
        // ============================================
        // Бот может прислать данные через web_app_data
        // Мы их обработаем здесь, если они придут
        // Для этого нужно, чтобы бот отправлял их через sendData
        // Но пока мы просто оставим возможность обновить данные

        // ============================================
        // 4. Аватар
        // ============================================
        const avatarContainer = document.getElementById('avatarContainer');
        function loadAvatar() {
            try {
                if (tg.initDataUnsafe?.user?.photo_url) {
                    const img = document.createElement('img');
                    img.src = tg.initDataUnsafe.user.photo_url;
                    img.alt = 'avatar';
                    img.onerror = function() {
                        avatarContainer.innerHTML = '<span style="font-size:32px;">👤</span>';
                    };
                    avatarContainer.innerHTML = '';
                    avatarContainer.appendChild(img);
                    return;
                }
            } catch (e) {}
            avatarContainer.innerHTML = `<span style="font-size:32px;">${isAdmin ? '👑' : '💎'}</span>`;
        }
        loadAvatar();

        // ============================================
        // 5. Частицы (фон)
        // ============================================
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        const resizeCanvas = () => {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particles = [];
        for (let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                r: Math.random() * 2 + 1,
                dx: (Math.random() - 0.5) * 0.4,
                dy: (Math.random() - 0.5) * 0.4,
                a: Math.random() * 0.4 + 0.1,
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => {
                p.x += p.dx; p.y += p.dy;
                if (p.x < 0 || p.x > w) p.dx *= -1;
                if (p.y < 0 || p.y > h) p.dy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.a})`;
                ctx.fill();
            });
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(255,255,255,${0.05 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // ============================================
        // 6. Поддержка
        // ============================================
        function sendSupportMessage(text) {
            const statusEl = document.getElementById('supportStatus');
            if (statusEl) {
                statusEl.textContent = '⏳ Отправка...';
                statusEl.className = 'support-status';
            }
            const data = {
                type: 'support',
                user_id: userId,
                username: userUsername,
                first_name: userName,
                text: text,
                is_admin: isAdmin,
            };
            try {
                tg.sendData(JSON.stringify(data));
                if (statusEl) {
                    statusEl.textContent = '✅ Сообщение отправлено!';
                    statusEl.className = 'support-status success';
                }
            } catch (e) {
                if (statusEl) {
                    statusEl.textContent = '❌ Ошибка отправки.';
                    statusEl.className = 'support-status error';
                }
            }
        }

        // ============================================
        // 7. Контент вкладок
        // ============================================
        const contentMap = {
            about: `<p>🤖 Бот создан <strong>@whyyhe</strong>.<br><br>Управление сообществом, статистика, поддержка.</p>`,
            bio: `
                <div class="social-links">
                    <a href="https://t.me/whyyhe" target="_blank">📩 Telegram <span class="label">личный</span></a>
                    <a href="https://t.me/w3hand" target="_blank">📢 Telegram <span class="label">канал</span></a>
                    <a href="https://www.instagram.com/oh.whyyhe" target="_blank">📸 Instagram</a>
                    <a href="https://www.tiktok.com/@oh.whyyhe" target="_blank">🎵 TikTok</a>
                    <a href="https://evgteem.github.io/my-site/" target="_blank">🌐 Сайт</a>
                </div>
            `,
            profile: `
                <div style="margin-top: 4px;">
                    <div class="stat-item"><span class="stat-label">👤 Имя</span><span class="stat-value">${userName}</span></div>
                    <div class="stat-item"><span class="stat-label">🆔 ID</span><span class="stat-value">${userId}</span></div>
                    <div class="stat-item"><span class="stat-label">📛 Юзернейм</span><span class="stat-value">@${userUsername}</span></div>
                    <div class="stat-item"><span class="stat-label">📅 Дата</span><span class="stat-value">${new Date().toLocaleDateString()}</span></div>
                    <div class="stat-item"><span class="stat-label">📊 Статус</span><span class="stat-value">${isAdmin ? '👑 Администратор' : 'Пользователь'}</span></div>
                </div>
            `,
            support: `
                <div class="support-form">
                    <textarea id="supportText" placeholder="Напишите ваше сообщение..." rows="3"></textarea>
                    <button class="send-btn" id="supportSendBtn">📩 Отправить</button>
                    <div id="supportStatus" class="support-status"></div>
                </div>
            `,
            vip: `
                <div style="text-align: center; padding: 20px 0;">
                    <div style="font-size: 48px; margin-bottom: 12px;">⭐</div>
                    <p style="color: #888; font-size: 16px; font-weight: 500;">VIP-раздел</p>
                    <p style="color: #555; font-size: 13px; margin-top: 8px;">В разработке</p>
                </div>
            `
        };

        function switchTab(tab) {
            document.getElementById('contentArea').innerHTML = contentMap[tab] || '<p>Раздел в разработке</p>';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
            if (tab === 'support') {
                const sendBtn = document.getElementById('supportSendBtn');
                const textarea = document.getElementById('supportText');
                if (sendBtn && textarea) {
                    sendBtn.addEventListener('click', function() {
                        const text = textarea.value.trim();
                        if (!text) {
                            const status = document.getElementById('supportStatus');
                            if (status) {
                                status.textContent = '❌ Напишите сообщение!';
                                status.className = 'support-status error';
                            }
                            return;
                        }
                        sendSupportMessage(text);
                        textarea.value = '';
                    });
                }
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                switchTab(this.dataset.tab);
            });
        });
        switchTab('about');

        // ============================================
        // 8. Если данные пришли от бота (web_app_data)
        // ============================================
        // Здесь можно будет обработать ответ от бота, если он пришлёт данные
        // Например, если бот отправит { type: 'user_data', id: 123, username: '...' }
        // Но для этого нужен обработчик в боте

        window.addEventListener('beforeunload', () => {
            tg.close();
        });

        console.log('✅ Сайт с плеером и VIP-вкладкой загружен!');
        console.log('👤 Пользователь:', { id: userId, name: userName, username: userUsername });
        console.log('👑 Админ:', isAdmin);
    </script>
</body>
</html>
